<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matlab-Arief</title>

<style>
    body {
        margin: 0;
        font-family: Arial, serif;
        background: #f4f4f4;
        color: #111;
    }

    /* NAVIGATION BAR */

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: white;
    border-bottom: 1px solid #ddd;
    position: relative;
}

/* Logo */
nav .logo {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

nav .logo img {
    height: 45px; /* adjust size as needed */
    width: auto;
}

    nav a {
        margin-right: 20px;
        text-decoration: none;
        color: #333;
        font-size: 18px;
    }

    nav a:hover {
        text-decoration: underline;
    }

    /* TITLE */
    .title {
        text-align: center;
        padding: 40px 0 20px;
        font-size: 30px;
        font-weight: bold;
        font-family: "Helvetica";
    }


    /* SECTION TITLE */
    .section-title {
        font-size: 25px;
        margin-left: 40px;
        margin-top: 40px;
        margin-bottom: 20px;
        font-weight: bold;
        font-family: "Helvetica";
    }


    .description {
        text-align: center;
        padding: 40px 0 20px;
        margin-left: 30px;
        margin-right: 30px;
        font-size: 20px;
    }

    /* CARD GRID */
    .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 0 40px 60px;
    }

    .card-link {
        text-decoration: none;
        color: inherit;
    }

    .card {
        position: relative;
        height: 250px;
        border-radius: 8px;
        overflow: hidden;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 20px;
        font-size: 22px;
        font-weight: bold;
        transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .card:hover {
        transform: scale(1.02);
        opacity: 0.9;
        cursor: pointer;
    }

    .card small {
        font-size: 16px;
        margin-top: 8px;
        font-weight: normal;
    }

    /* Background placeholders */
    .bg1 { background: url('virus_edited.jpg') center/cover; }
    .bg2 { background: url('bbe_2d.png') center/cover; }
    .bg3 { background: url('brain2.jpg') center/cover; }

    /* ===========================
   MOBILE & TABLET RESPONSIVE
   =========================== */

/* For tablets and small laptops */
@media (max-width: 992px) {
    nav {
        padding: 15px 20px;
    }
    .cards {
        grid-template-columns: repeat(2, 1fr); 
        padding: 0 20px 40px;
    }
}

/* For mobile phones */
@media (max-width: 600px) {

    /* NAVIGATION becomes stacked */
    nav {
        flex-direction: column;
        padding: 10px 0;
        text-align: center;
    }

    nav .left, 
    nav .right {
        display: flex;
        gap: 15px;
        margin: 5px 0;
    }

    nav .logo {
        position: static;
        transform: none;
        margin: 10px 0;
    }

    nav a {
        font-size: 16px;
        margin-right: 0;
    }

    /* TITLE */
    .title {
        padding: 25px 0 10px;
        font-size: 24px;
        margin: 0 10px;
    }

    /* Paragraph description */
    .description {
        margin: 0 15px;
        font-size: 14px;
    }

    /* Section title spacing */
    .section-title {
        font-size: 24px;
        margin-left: 15px;
        margin-top: 30px;
    }

    /* CARDS become 1-column */
    .cards {
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 0 15px 40px;
    }

    .card {
        height: 180px;
        font-size: 18px;
        padding: 15px;
    }

    .card small {
        font-size: 14px;
    }

    /* Video container full width */
    .video-container {
        width: 100%;
        margin-left: 0;
    }
}

</style>
</head>
