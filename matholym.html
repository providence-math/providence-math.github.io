<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mathematical Olympiad</title>

    <!-- Important for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset & base styles (mobile-first) */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            text-align: center;
        }

        /* Logo */
        .logo {
            padding: 16px;
        }

        .logo img {
            width: 40px;
            max-width: 100%;
            height: auto;
        }

        /* Photo */
        .photo {
            padding: 0 16px;
        }

        .photo img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 12px;
        }

        /* Text */
        .text {
            padding: 20px 16px 32px;
            max-width: 680px;
            margin: 0 auto;
            font-size: 16px;
            line-height: 1.7;
        }

        /* Larger screens (tablets & desktop) */
        @media (min-width: 768px) {
            .logo img {
                width: 40px;
            }

            .text {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <!-- Logo at top -->
    <div class="logo">
       <a href="index.html"> <img src="logo_2.png" alt="Logo"> </a>
    </div>

    <!-- Photo -->
    <div class="photo">
        <img src="MO_training_probono_18_1_2026.png" alt="Main Photo">
    </div>

    <!-- Text -->
    <div class="text">
        <p>
            First math olympiad session with SMAN 90 students on 18 January 2026, reviewing counting basics in Combinatorics.
        </p>
    </div>

        <!-- Photo -->
    <div class="photo">
        <img src="MO_training_probono_25_1_2026.png" alt="Main Photo">
    </div>

    <!-- Text -->
    <div class="text">
        <p>
            Second math olympiad session with SMAN 90 students on 18 January 2026.
        </p>
    </div>

</body>
</html>
